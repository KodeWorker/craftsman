# craftsman.yaml
# Configuration file for the Craftsman autonomous agent framework.
# Edit values as needed for your environment.

logging:
  debug: true # show logs on the console
  level: DEBUG

workspace:
  root: ~/.craftsman
  database: ~/.craftsman/database
  secrets: ~/.craftsman/secrets
  logs: ~/.craftsman/logs

crypto:
  size: 32 # 256-bit keys for AES-256 encryption
  algorithm: HS256 # HMAC-SHA256 for signing encrypted data
  duration_hr: 8 # hours before encrypted data expires

provider:
  debug: true # true: show reasoning steps
  # llama.cpp uses openai/<model-name> for compatibility
  model: openai/gemma-4-E4B-it
  max_tokens: 131072
  input_cost_per_token: 0.000000
  output_cost_per_token: 0.000000
  capabilities:
    vision:
      enabled: true
      formats: [image/jpeg, image/png, image/webp, image/gif]
      # SigLIP encoder: token cost is resolution-based, not file-size-based
      # 10MB covers all phone photos (3-8MB); RAW/TIFF should be exported first
      max_size_mb: 10
    audio:
      enabled: true
      formats: [wav, mp3]
      # Gemma 4 audio encoder: 10MB MP3 → ~1085 tokens (duration-based, not
      # file-size-based); 25MB → ~2710 tokens (~2% of 131K context)
      max_size_mb: 25

commands:
  - name: /help
    description: Show this help message.
  - name: /clear
    description: Clear the conversation history.
  - name: /system
    description: Show system prompts.
  - name: /exit
    description: Exit the application.
  - name: /artifacts
    description: List artifacts uploaded in the current session.
  - name: /compact
    description: Compact the conversation history by summarizing it.
    limit: 1000 # token limit for the summary when compacting
    keep_turns: 5 # number of recent messages to keep in full detail when compacting
